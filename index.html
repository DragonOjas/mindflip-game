<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MindFlip | Space Memory</title>
    
    <style>
        #auth-screen {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(5, 5, 30, 0.97);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }
        #auth-box {
            background: linear-gradient(135deg, #0a0a2e, #1a1a4e);
            border: 4px solid #00f0ff;
            border-radius: 16px;
            box-shadow: 0 0 40px #00f0ff, inset 0 0 25px rgba(0, 240, 255, 0.4);
            width: 92%;
            max-width: 420px;
            padding: 35px 25px;
            text-align: center;
            color: #fff;
        }
        #auth-box h2 {
            margin: 0 0 25px;
            font-size: 2.1rem;
            text-shadow: 0 0 20px #00f0ff;
            letter-spacing: 4px;
        }
        #auth-box input {
            width: 100%;
            padding: 14px 16px;
            margin: 12px 0;
            background: #0f1a2e;
            border: 2px solid #00f0ff;
            color: #fff;
            font-size: 1.1rem;
            border-radius: 8px;
            box-shadow: inset 0 0 10px rgba(0, 240, 255, 0.3);
        }
        #auth-box input:focus {
            outline: none;
            border-color: #ff00aa;
            box-shadow: 0 0 18px #ff00aa;
        }
        #auth-box button {
            background: linear-gradient(#ff00aa, #cc0088);
            color: white;
            border: none;
            padding: 14px 32px;
            margin: 12px 6px;
            font-size: 1.15rem;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 0 20px #ff00aa;
            transition: 0.3s;
        }
        #auth-box button:hover {
            transform: scale(1.05);
            background: #00f0ff;
            color: #000;
        }
        .auth-switch {
            color: #00f0ff;
            cursor: pointer;
            margin-top: 20px;
            text-decoration: underline;
        }
        #music-btn {
            position: fixed;
            top: 18px;
            right: 18px;
            width: 52px;
            height: 52px;
            background: rgba(10,10,40,0.9);
            border: 3px solid #00f0ff;
            color: #fff;
            font-size: 1.9rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
            cursor: pointer;
            box-shadow: 0 0 25px #00f0ff;
        }
        #auth-bar-container {
            margin: 15px 0;
        }
    </style>
</head>
<body>

<canvas id="bg"></canvas>

<audio id="menuMusic" loop preload="metadata" src="menu_music.mp3"></audio>
<audio id="winMusic" loop preload="metadata" src="win_music.mp3"></audio>

<div id="music-btn" onclick="toggleMusic()">🎵</div>

<div id="menu">
    <div class="menu-box">
        <h1>🧠 MindFlip</h1>
        <div id="auth-bar-container"></div>

        <p>Game Mode</p>
        <div class="btn-group" id="modeSelect">
            <button class="active" onclick="selectMode('single',this)">Single</button>
            <button onclick="selectMode('multi',this)">Multi</button>
        </div>

        <input id="p1" placeholder="Player 1 Name">
        <input id="p2" placeholder="Player 2 Name" style="display:none;">

        <p>Difficulty</p>
        <div class="btn-group" id="diffSelect">
            <button class="active" onclick="selectDiff(4,this)">Easy</button>
            <button onclick="selectDiff(6,this)">Medium</button>
            <button onclick="selectDiff(8,this)">Hard</button>
        </div>

        <p>Select Level</p>
        <div id="levels"></div>

        <button class="start-btn" onclick="startGame()">▶ Start Mission</button>
    </div>
</div>

<div id="victory-screen" class="victory-overlay" style="display:none;">
    <div class="victory-box">
        <div class="trophy">🏆</div>
        <h2 id="winner-display">Winner!</h2>
        <div id="record-msg" style="color:#facc15; font-weight:bold; margin-bottom:10px; font-size:1.1rem;"></div>
        
        <div class="victory-btns">
            <button class="start-btn" onclick="restartLevel()">🔄 Play Again</button>
            <button class="secondary-btn" onclick="backToMenu()">🏠 Main Menu</button>
        </div>
    </div>
</div>

<div id="auth-screen">
    <div id="auth-box">
        <h2 id="auth-title">🔑 SIGN IN</h2>
        
        <input id="auth-username" placeholder="👽 Username">
        <input id="auth-password" type="password" placeholder="🔒 Password">
        
        <div id="signup-fields" style="display:none;">
            <input id="auth-email" placeholder="📡 Email (optional)">
        </div>
        
        <button onclick="handleAuth()">🚀 CONFIRM MISSION</button>
        <div id="auth-msg" style="margin:15px 0; min-height:24px; font-weight:bold; color:#ff00aa;"></div>
        
        <span class="auth-switch" onclick="toggleAuthMode()">✨ New Cadet? Create Account</span>
        <button onclick="hideAuth()" style="background:#334455; margin-top:15px;">← Back to Hangar</button>
    </div>
</div>

<h3 id="stats"></h3>
<div id="turn"></div>
<div class="grid" id="grid"></div>

<script src="script.js"></script>
</body>
</html>
